<script>
// ================================
// GAS WebApp URL
// ================================
const GAS_URL = "https://script.google.com/macros/s/AKfycbwKFsOZ2pNAFL9ykoNEaBpLdblfY33NEkn0HnRzXXWiRESWyY_FMYGdp6f68J2_kMPv/exec";


// ================================
// 開催場の整形（2回中山6日 → 中山）
// ================================
function normalizeMeeting(meeting) {
    return meeting.replace(/^\d+回/, "").replace(/\d+日$/, "");
}

// ================================
// CNAME 自動判別 → GAS に送信（完全安定版）
// ================================
console.log("cname:", document.getElementById('cname').value);

async function updateOdds() {

    // ▼ 入力値を確実に取得（IME確定待ち）
    await new Promise(resolve => setTimeout(resolve, 50));

    const raw = document.getElementById('cname').value.trim();

    // ▼ CNAME が空なら即終了
    if (!raw) {
        alert("CNAME を入力してください");
        return;
    }

    // ▼ pw151 / pw153 / pw156 を抽出
    const tokens = raw.split(/[\s\n\r]+/).filter(t => t.startsWith("pw"));

    let tanfuku = "";
    let wakuren = "";
    let umatan  = "";

    tokens.forEach(t => {
        if (t.includes("151")) tanfuku = t;
        if (t.includes("153")) wakuren = t;
        if (t.includes("156")) umatan  = t;
    });

    // ▼ 必須 CNAME が揃っていない場合
    if (!tanfuku || !wakuren || !umatan) {
        alert("単複(151)・枠連(153)・馬単(156) の CNAME が揃っていません");
        return;
    }

    // ▼ GAS URL 作成
    const url = GAS_URL
        + "?tanfuku=" + encodeURIComponent(tanfuku)
        + "&wakuren=" + encodeURIComponent(wakuren)
        + "&umatan="  + encodeURIComponent(umatan);

    let json;

    try {
        const res = await fetch(url);

        if (!res.ok) {
            alert("GAS への接続に失敗しました");
            return;
        }

        json = await res.json();

        if (!json || json.status === "error") {
            alert("GAS エラー: " + (json?.message || "不明なエラー"));
            return;
        }

        // ▼ レース情報が無い場合のガード
        if (!json.race || !json.race.meeting || !json.race.raceNo) {
            alert("レース情報が取得できませんでした");
            return;
        }

    // ★★★ raceInfo を必ず表示状態にする（これが重要） ★★★
    const raceInfoBox = document.getElementById("raceInfo");
    if (raceInfoBox) raceInfoBox.style.display = "block";

        // ▼ レース情報
        renderRaceInfo(json);

        // ▼ タイトル変更
        const meetingName = normalizeMeeting(json.race.meeting || "");
        document.title = `${meetingName}${json.race.raceNo}R`;

        // ▼ 馬データ一覧
        renderHorseDetailTable("horseDetailArea", json.odds.tanfuku || []);

        // ▼ 内部データ更新
        window._tanfuku = json.odds.tanfuku || [];
        window._wakuren = json.odds.wakuren || [];
        window._umatan  = json.odds.umatan  || [];

        // ▼ 生オッズテキスト反映
        document.getElementById('inW').value =
            window._wakuren.map(o => `${o.rank} ${o.pair} ${o.odds}`).join("\n");

        document.getElementById('inT').value =
            window._tanfuku.map(o => {
                const fuku = `${o.fukuMin} - ${o.fukuMax}`;
                return `${o.rank} 枠${o.waku} ${o.num} ${o.tan}\n${fuku}`;
            }).join("\n");

        document.getElementById('inU').value =
            window._umatan.map(o => `${o.rank} ${o.pair} ${o.odds}`).join("\n");

        alert("オッズを更新しました。『解析』ボタンを押してください。");

    } catch (e) {
        console.error(e);
        alert("GAS からオッズを取得できませんでした");
        return;
    }

    // ▼ 解析前は買い目条件エリアと結果エリアを隠す
    const cond = document.getElementById("buyConditionArea");
    if (cond) cond.classList.add("hidden");

    const buyResultEl = document.getElementById("buyResultArea");
    if (buyResultEl) buyResultEl.classList.add("hidden");
}

// ================================
// レース情報を描画する関数
// ================================
function renderRaceInfo(info) {
    const box = document.getElementById("raceInfo");

    const meetingName = normalizeMeeting(info.race.meeting);

    const html = `
        開催日：${info.race.date}　開催場：${meetingName}<br>
        レース番号：${info.race.raceNo}R　レース名：${info.race.raceName}<br>
        発走時刻：<span class="race-posttime">${info.race.postTime}</span><br>
        更新：<span class="race-refresh">${info.updatedAt}</span>
    `;

    box.innerHTML = html;
}

// ================================
// 「買い目抽出」ボタンのクリック処理
// ================================

document.getElementById("btnExtract").addEventListener("click", () => {
    // 解析が終わっていない場合は警告
    if (!window._wakuren || !window._tanfuku) {
        alert("先に『解析』を実行してください。");
        return;
    }

    // 買い目条件エリアを表示
    document.getElementById("buyConditionArea").classList.remove("hidden");

    // 買い目抽出結果エリアを表示
    document.getElementById("buyResultArea").classList.remove("hidden");

    // ★ 買い目抽出ロジックを実行
    extractBuy();
});

// ================================
// 解析（既存ロジックをそのまま使用）
// ================================
function processData() {

    // ============================
    // ① 枠連（既存ロジックそのまま）
    // ============================
    const rawW = document.getElementById('inW').value;
    const dataW = parsePairOdds(rawW);
    if (dataW.length > 0) {
        const result = analyzeWakurenLogic(dataW);

        window._wakurenResult = result;

        const infoT = document.getElementById('infoTateme');
        if (result.tateme) {
            infoT.innerText = `縦目: ${result.tateme}`;
            infoT.style.display = 'inline-block';
        }

        const infoU = document.getElementById('infoUraninki');
        infoU.innerText = `裏人気 ${result.uraninki}`;
        infoU.style.display = 'inline-block';

        renderWakurenTable('outW', result);

        const occData = calculateOccurrence(dataW, result.uraNum, result.tateNum);
        renderOccurrenceTable('outOccurrence', occData);
    }

    // ============================
    // ② 単複（JSON を直接処理）
    // ============================
    const tanfuku = window._tanfuku;   // ← updateOdds() で保存した JSON
    if (tanfuku && tanfuku.length > 0) {

        // --- 単勝オッズ人気順（rank 昇順） ---
        const winData = [...tanfuku]
            .sort((a, b) => Number(a.rank) - Number(b.rank))
            .map(o => ({
                rank: o.rank,
                waku: o.waku,
                horse: o.num,
                win: o.tan
            }));

        renderMainTable("tblWin", winData, false);

// --- 複勝オッズ人気順（fukuMin → fukuMax → num） ---
const placeData = [...tanfuku]
    .sort((a, b) => {
        // ① 下限値
        if (a.fukuMin !== b.fukuMin) {
            return a.fukuMin - b.fukuMin;
        }
        // ② 上限値
        if (a.fukuMax !== b.fukuMax) {
            return a.fukuMax - b.fukuMax;
        }
        // ③ 馬番
        return Number(a.num) - Number(b.num);
    })
    .map((o, idx) => ({
        rank: idx + 1,                     // 複勝人気を振り直す
        waku: o.waku,
        horse: o.num,
        pStr: `${o.fukuMin} - ${o.fukuMax}`,   // ★ スペース入り
        fukuMin: o.fukuMin,
        fukuMax: o.fukuMax
    }));

        renderMainTable("tblPlace", placeData, true);
    }

    // ============================
    // ③ 馬単（既存ロジック）
    // ============================
    const rawU = document.getElementById('inU').value;
    const dataU = parsePairOdds(rawU, 150);
    if (dataU.length > 0) {
        renderUmatanTable('outU', dataU);
    }

    // 解析が完了したので買い目条件エリアを表示
    document.getElementById("buyConditionArea").classList.remove("hidden");
    // 買い目結果エリアはまだ非表示
    document.getElementById("buyResultArea").classList.add("hidden");
}

// ================================
// クリア（clearAll に統一）
// ================================
function clearAll() {

const cnameEl = document.getElementById('cname');
cnameEl.value = "";   // ← 入力欄をクリア
cnameEl.focus();      // ← 次の入力をしやすくする

    // ★ テキストエリアをクリア
    document.getElementById("inW").value = "";
    document.getElementById("inT").value = "";
    document.getElementById("inU").value = "";

    // ★ outW / outU / outOccurrence / buyResult をクリア
    const safeClearIds = ["outW", "outU", "outOccurrence", "buyResult"];
    safeClearIds.forEach(id => {
        const el = document.getElementById(id);
        if (el) el.innerHTML = "";
    });

    // ★ レース情報・馬データ
    document.getElementById("raceInfo").innerHTML = "";
    document.getElementById("horseDetailArea").innerHTML = "";

    // ★ ★ ★ ここが今回の追加ポイント ★ ★ ★
    document.getElementById("tblWin").innerHTML = "";
    document.getElementById("tblPlace").innerHTML = "";

    // 非表示エリア
    document.getElementById("buyResultArea").classList.add("hidden");
    document.getElementById("buyConditionArea").classList.add("hidden");

    // バッジ
    document.getElementById('infoTateme').style.display = 'none';
    document.getElementById('infoUraninki').style.display = 'none';

    // 内部データ
    window._wakurenResult = null;
    window._wakuren = null;
    window._umatan = null;
    window._tanfuku = null;
    window._highlightPairs = [];

    window.scrollTo(0, 0);
}

// ================================
// --- ロジック層：枠番出現順一覧の算出 ---
// ================================
function calculateOccurrence(data, uraNum, tateNum) {
    let bracketMap = {};
    let appearanceOrder = [];

    // 初期化
    for (let i = 1; i <= 8; i++) bracketMap[i] = [];

    data.forEach(item => {
        const [a, b] = item.pair.split('-').map(Number);

        if (!bracketMap[a].includes(b)) {
            bracketMap[a].push(b);
            if (!appearanceOrder.includes(a)) appearanceOrder.push(a);
        }
        if (a !== b && !bracketMap[b].includes(a)) {
            bracketMap[b].push(a);
            if (!appearanceOrder.includes(b)) appearanceOrder.push(b);
        } else if (a === b && !appearanceOrder.includes(a)) {
            appearanceOrder.push(a);
        }
    });

    // 行のソートロジック
    let sortedBrackets = [];
    if (uraNum) sortedBrackets.push(Number(uraNum));
    if (tateNum && !sortedBrackets.includes(Number(tateNum))) sortedBrackets.push(Number(tateNum));

    appearanceOrder.forEach(n => {
        if (!sortedBrackets.includes(n)) sortedBrackets.push(n);
    });

    return sortedBrackets.map(n => ({
        base: n,
        partners: bracketMap[n]
    }));
}

// ================================
// --- 以下、既存ロジック統合 ---
// ================================
function calculateTatemePair(fav1, fav2) {
    if (!fav1 || !fav2) return null;
    let n1 = fav1.split('-');
    let n2 = fav2.split('-');
    let common = null;
    for (let i = 0; i < n1.length; i++) {
        let foundIdx = n2.indexOf(n1[i]);
        if (foundIdx !== -1) {
            common = n1[i];
            n1.splice(i, 1);
            n2.splice(foundIdx, 1);
            break;
        }
    }
    if (common) return [n1[0], n2[0]].sort((a, b) => a - b).join('-');
    return null;
}

function calculateUraninki(data, uraNum) {
    if (!uraNum) return 0;
    let count = 0;
    for (let i = 0; i < data.length; i++) {
        if (data[i].pair.split('-').includes(uraNum)) count++;
        else break;
    }
    return count;
}

function analyzeWakurenLogic(data) {
    if (data.length < 2) return { uraNum: '', tateNum: '', tateme: null, uraninki: 0, list: data };
    const fav1Pair = data[0].pair.split('-');
    const fav2Pair = data[1].pair.split('-');
    let uraNum = fav1Pair.find(n => fav2Pair.includes(n));
    let tateNum = fav1Pair.find(n => !fav2Pair.includes(n));
    if (!uraNum) { uraNum = fav1Pair[0]; tateNum = fav1Pair[1]; }
    if (!tateNum) tateNum = (uraNum === fav1Pair[0]) ? fav1Pair[1] : fav1Pair[0];

    const uraninkiCount = calculateUraninki(data, uraNum);
    let ref2Num = fav2Pair.find(n => !fav1Pair.includes(n)) || fav2Pair[0]; 
    const tatemePair = calculateTatemePair(data[0].pair, data[1].pair);

    let counts = { ura: 0, tate: 0, fav2: 0 };
    const list = data.map(item => {
        const nums = item.pair.split('-');
        let labels = [];
        if (nums.includes(tateNum)) { counts.tate++; labels.push(`<span class="logic-tate">縦${counts.tate}</span>`); }
        if (nums.includes(uraNum)) { counts.ura++; labels.push(`<span class="logic-ura">裏${counts.ura}</span>`); }
        if (nums.includes(ref2Num)) { counts.fav2++; labels.push(`<span class="logic-fav2">2人気${counts.fav2}番目</span>`); }
        return { ...item, logicText: labels.join(' '), isTateme: (item.pair === tatemePair) };
    });

    return { uraNum, tateNum, ref2Num, tateme: tatemePair, uraninki: uraninkiCount, list: list };
}

function parsePairOdds(text, max = 999) {
    return text.split('\n').map(line => {
        const m = line.match(/(\d+)\s+(\d+[\-]\d+)\s+([\d\.]+)/);
        return m ? { rank: m[1], pair: m[2], odds: m[3] } : null;
    }).filter(x => x).slice(0, max);
}

function parseTanshoFukusho(text) {
    const tokens = text.split(/[\s\n\r]+/).filter(t => t.length > 0);
    let res = [];
    for (let i = 0; i < tokens.length; i++) {
        if (tokens[i+1] && tokens[i+1].startsWith("枠")) {
            let win = "0.0", pMin = 999, pStr = "---";
            for (let j = i+4; j < i+12; j++) {
                if (!isNaN(tokens[j]) && !tokens[j].includes("-")) {
                    win = tokens[j];
                    if (tokens[j+1] && tokens[j+2] === "-") {
                        pMin = parseFloat(tokens[j+1]);
                        pStr = tokens[j+1] + "-" + tokens[j+3];
                    }
                    break;
                }
            }
            res.push({ rank: tokens[i], waku: tokens[i+1].replace("枠","").charAt(0), horse: tokens[i+2], win, pMin, pStr });
        }
    }
    return res;
}

    // ================================
    // --- 枠連人気ごとの買い目抽出関数 ---
    // ================================
    // ============================================
    // ★ 枠連1・2・3人気の買い目抽出
    // ============================================
function extractWakuNinkiBuy(n, wakuren, umatan, tanfuku) {

    // n人気の枠連データ
    const wr = wakuren[n - 1];
    const pair = wr.pair;        
    const odds = Number(wr.odds); 

    // -------------------------------
    // 人気ごとの条件設定
    // -------------------------------
    let minOdds = 0;
    let maxOdds = 999;
    let minUmatan = 0;
    let maxWinRank = 999;

    if (n === 1) {
        // ★ 枠連1人気の条件
        minOdds = 3.0;
        maxOdds = 7.1;
        minUmatan = 15.0;
        maxWinRank = 10;
    }

    if (n === 2) {
        // ★ 枠連2人気の条件
        minOdds = 4.0;
        maxOdds = 12.0;
        minUmatan = 16.0;
        maxWinRank = 11;
    }

    if (n === 3) {
    // ★ 枠連3人気の条件
    minOdds = 6.0;
    maxOdds = 11.5;
    minUmatan = 16.0;
    maxWinRank = 12;
    }

    // ① 枠連オッズが範囲外なら抽出しない
    if (odds < minOdds || odds > maxOdds) {
        return "";
    }

    const [w1, w2] = pair.split("-").map(Number);

    // 枠 → 馬番リスト
    const list1 = tanfuku.filter(h => Number(h.waku) === w1).map(h => h.num);
    const list2 = tanfuku.filter(h => Number(h.waku) === w2).map(h => h.num);

    // 馬番の全組み合わせ
    const combos = [];
    list1.forEach(a => {
        list2.forEach(b => {
            combos.push(`${a}-${b}`);
            combos.push(`${b}-${a}`);
        });
    });

    // 単勝人気（rank）を参照
    const winRank = {};
    tanfuku.forEach(h => {
        winRank[h.num] = Number(h.rank);
    });

    // 馬単オッズから該当するものを抽出
    const hits = umatan.filter(u => {

        if (!combos.includes(u.pair)) return false;

        // ② 馬単オッズが指定以上
        if (Number(u.odds) < minUmatan) return false;

        // ③ 単勝人気が maxWinRank 以内
        const [a, b] = u.pair.split("-").map(Number);
        if (winRank[a] > maxWinRank || winRank[b] > maxWinRank) return false;

        return true;
    });

    if (hits.length === 0) return "";

    window._highlightPairs = window._highlightPairs || [];
    window._highlightPairs.push(pair);

    return hits.map(h => `${h.pair} (${h.odds})`).join(" ");
}

    // ============================================
    // ★ 縦2番目の買い目抽出
    // ============================================

    function extractTate2Buy(wakurenResult, umatan, tanfuku) {
    // wakurenResult = analyzeWakurenLogic(dataW) の戻り値

    // 1) 縦2番目に該当する枠連行を探す
    const tate2Row = wakurenResult.list.find(d => d.logicText.includes('縦2'));
    if (!tate2Row) return "";

    const ninki = Number(tate2Row.rank);   // 何人気か
    const odds  = Number(tate2Row.odds);   // 枠連オッズ
    const pair  = tate2Row.pair;           // "6-9" など

    // 2) 4〜6人気以外は除外
    if (ninki < 4 || ninki > 6) {
        return "";
    }

    // 3) 人気ごとの枠連オッズ範囲
    let minOdds = 0;
    let maxOdds = 0;

    if (ninki === 4) {
        minOdds = 8.0;
        maxOdds = 11.5;
    } else if (ninki === 5) {
        minOdds = 9.1;
        maxOdds = 15.5;
    } else if (ninki === 6) {
        minOdds = 12.1;
        maxOdds = 16.5;
    }

    // 枠連オッズが範囲外なら抽出しない
    if (odds < minOdds || odds > maxOdds) {
        return "";
    }

    // 4) ここから先は馬単抽出ロジック（20倍以上＋単勝12人気以内）

    const [w1, w2] = pair.split("-").map(Number);

    const list1 = tanfuku.filter(h => Number(h.waku) === w1).map(h => h.num);
    const list2 = tanfuku.filter(h => Number(h.waku) === w2).map(h => h.num);

    const combos = [];
    list1.forEach(a => {
        list2.forEach(b => {
            combos.push(`${a}-${b}`);
            combos.push(`${b}-${a}`);
        });
    });

    const winRank = {};
    tanfuku.forEach(h => {
        winRank[h.num] = Number(h.rank);
    });

    const hits = umatan.filter(u => {
        if (!combos.includes(u.pair)) return false;

        // 馬単20倍以上
        if (Number(u.odds) < 20.0) return false;

        // 単勝12人気以内同士
        const [a, b] = u.pair.split("-").map(Number);
        if (winRank[a] > 12 || winRank[b] > 12) return false;

        return true;
    });

    if (hits.length === 0) return "";

    window._highlightPairs = window._highlightPairs || [];
    window._highlightPairs.push(pair);

    return hits.map(h => `${h.pair} (${h.odds})`).join(" ");
    }

// ============================================
// ★ 縦裏3～7までのロジック共通関数
// ============================================
function extractTateUraBuyCommon(wakurenResult, umatan, tanfuku, logicNo, config) {

    // 1) 縦N・裏N の両方を抽出
    const rows = wakurenResult.list.filter(d =>
        d.logicText.includes(`縦${logicNo}`) ||
        d.logicText.includes(`裏${logicNo}`)
    );

    if (rows.length === 0) return "";

    let allHits = [];

    rows.forEach(row => {

        const ninki = Number(row.rank);
        const odds  = Number(row.odds);
        const pair  = row.pair;

        // 2) 人気ごとの枠連オッズ範囲
        const range = config.oddsRange[ninki];
        if (!range) return;

        const [minOdds, maxOdds] = range;
        if (odds < minOdds || odds > maxOdds) return;

        // 3) 枠 → 馬番リスト
        const [w1, w2] = pair.split("-").map(Number);

        const list1 = tanfuku.filter(h => Number(h.waku) === w1).map(h => h.num);
        const list2 = tanfuku.filter(h => Number(h.waku) === w2).map(h => h.num);

        const combos = [];
        list1.forEach(a => list2.forEach(b => {
            combos.push(`${a}-${b}`);
            combos.push(`${b}-${a}`);
        }));

        // 単勝人気
        const winRank = {};
        tanfuku.forEach(h => winRank[h.num] = Number(h.rank));

        // 4) 馬単オッズ条件 ＋ 単勝人気条件
        const hits = umatan.filter(u => {

            if (!combos.includes(u.pair)) return false;

            if (Number(u.odds) < config.umatanMinOdds) return false;

            const [a, b] = u.pair.split("-").map(Number);
            if (winRank[a] > config.maxWinRank ||
                winRank[b] > config.maxWinRank) return false;

            return true;
        });

        if (hits.length > 0) {
            window._highlightPairs.push(pair);
            allHits.push(...hits);
        }
    });

    if (allHits.length === 0) return "";

    return allHits.map(h => `${h.pair} (${h.odds})`).join(" ");
}

    // ============================================
    // ★ 2人気3番目の買い目抽出
    // ============================================
    function extractNinki2_3Buy(wakurenResult, umatan, tanfuku) {

    // 1) 「2人気3番目」ラベルを持つ行を探す
    const row = wakurenResult.list.find(d =>
        d.logicText.includes('2人気3番目')
    );
    if (!row) return "";

    const ninki = Number(row.rank);  // 枠連人気
    const odds  = Number(row.odds);  // 枠連オッズ
    const pair  = row.pair;          // "6-9" など

    // 2) 人気8〜11のみ対象
    if (ninki < 8 || ninki > 11) {
        return "";
    }

    // 3) 枠連オッズ範囲（8〜11人気共通）
    if (odds < 14.0 || odds > 35.0) {
        return "";
    }

    // 4) 枠 → 馬番リスト
    const [w1, w2] = pair.split("-").map(Number);

    const list1 = tanfuku.filter(h => Number(h.waku) === w1).map(h => h.num);
    const list2 = tanfuku.filter(h => Number(h.waku) === w2).map(h => h.num);

    const combos = [];
    list1.forEach(a => {
        list2.forEach(b => {
            combos.push(`${a}-${b}`);
            combos.push(`${b}-${a}`);
        });
    });

    // 単勝人気
    const winRank = {};
    tanfuku.forEach(h => {
        winRank[h.num] = Number(h.rank);
    });

    // 5) 馬単40倍以上 ＋ 単勝10人気以内 ＋ 単勝1人気が絡む馬単は除外
    const hits = umatan.filter(u => {

        if (!combos.includes(u.pair)) return false;

        // 馬単40倍以上
        if (Number(u.odds) < 40.0) return false;

        const [a, b] = u.pair.split("-").map(Number);

        // 単勝10人気以内
        if (winRank[a] > 10 || winRank[b] > 10) return false;

        // 単勝1人気が絡む組み合わせは除外
        if (winRank[a] === 1 || winRank[b] === 1) return false;

        return true;
    });

    if (hits.length === 0) return "";

    window._highlightPairs = window._highlightPairs || [];
    window._highlightPairs.push(pair);

    return hits.map(h => `${h.pair} (${h.odds})`).join(" ");
}

// --- 馬データ一覧テーブル生成関数 ---

function renderHorseDetailTable(targetId, tanfukuRows) {
    const target = document.getElementById(targetId);
    target.innerHTML = "";

    let html = `
        <table class="horse-detail">
            <tr>
                <th>人気</th>
                <th>枠</th>
                <th>馬番</th>
                <th>馬名</th>
                <th>単勝</th>
                <th>複勝</th>
                <th>性齢</th>
                <th>馬体重</th>
                <th>負担重量</th>
                <th>騎手名</th>
                <th>調教師名</th>
            </tr>
    `;

    tanfukuRows.forEach(r => {

        // 枠画像
        const wakuImg = `<img src="waku/${r.waku}.png" alt="${r.waku}" width="20">`;

        // 単勝オッズ（10.0 以下 → 赤太字）
        const tanClass = Number(r.tan) <= 10.0 ? "odds-red" : "";

        // 複勝オッズ（スペース入り）
        const fukuStr = `${r.fukuMin} - ${r.fukuMax}`;

        html += `
            <tr>
                <td>${r.rank}</td>
                <td>${wakuImg}</td>
                <td>${r.num}</td>
                <td>${r.horse}</td>
                <td class="${tanClass}">${r.tan}</td>
                <td>${fukuStr}</td>
                <td>${r.age}</td>
                <td>${r.hWeight}</td>
                <td>${r.weight}</td>
                <td>${r.jockey}</td>
                <td>${r.trainer}</td>
            </tr>
        `;
    });

    html += `</table>`;
    target.innerHTML = html;
}

function renderUmatanTable(targetId, data) {
    const target = document.getElementById(targetId);
    target.innerHTML = '';

    const perCol = 60;   // ★ 馬単は60人気ごと
    const maxCols = 4;
    const total = data.length;
    const cols = Math.min(maxCols, Math.ceil(total / perCol));

    for (let col = 0; col < cols; col++) {
        const start = col * perCol;
        const end = start + perCol;
        const slice = data.slice(start, end);

        if (slice.length === 0) continue;

        let html = `<table class="w-tbl">
            <tr><th>人気</th><th>組番</th><th>オッズ</th></tr>`;

        slice.forEach(d => {
            html += `<tr>
                <td>${d.rank}</td>
                <td style="background:#fffde7">${d.pair}</td>
                <td>${d.odds}</td>
            </tr>`;
        });

        html += `</table>`;
        target.insertAdjacentHTML('beforeend', html);
    }
}
